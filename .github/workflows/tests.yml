name: Tests

# Fast offline test suite — runs on every push and PR.
# (For the live KULINE integration suite see live.yml; that's nightly cron only.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: kuopac-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install kuopac + dev deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        env:
          PYTHONIOENCODING: "utf-8"
        run: uv run pytest -v --tb=short --color=no
